<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Cuenta</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<header>
    <h2>Mi Cuenta</h2>
    <button class="btn-iniciarSesion" id="logOutUser">Salir</button>
</header>

<div class="container">

    <!-- ===== INFO DEL USUARIO ===== -->
    <section class="account-card">
        <h2>Información del usuario</h2>

        <!-- Aquí luego pondrás datos reales -->
        <p><strong>Nombre:</strong> <!-- nombre del usuario --></p>
        <p><strong>Email:</strong> <!-- email del usuario --></p>
        <p><strong>Rol:</strong> <!-- rol del usuario --></p>

        <!-- Botón futuro para editar perfil -->
        <button class="btn-iniciarSesion">Editar perfil</button>
    </section>

    <!-- ===== PEDIDOS ===== -->
    <section class="account-card">
        <h2>Mis pedidos</h2>

        <!-- Contenedor donde luego cargarás pedidos -->
        <div class="orders-list">

            <!-- Pedido ejemplo -->
            <div class="order-item">
                <p><strong>Pedido #001</strong></p>
                <p>Fecha: <!-- fecha --></p>
                <p>Total: $<!-- total --></p>
                <p>Estado: <!-- estado --></p>
            </div>

            <!-- Aquí luego se generan más pedidos -->
        </div>
    </section>

</div>

</body>
</html>
